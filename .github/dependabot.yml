version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      wxt-vite:
        patterns:
          - "wxt"
          - "vite"
          - "@vitejs/*"
      testing:
        patterns:
          - "vitest"
          - "vitest-*"
          - "@vitest/*"
          - "@playwright/*"
          - "@testing-library/*"
          - "jsdom"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
